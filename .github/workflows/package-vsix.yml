name: Package VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build VS Code extension package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare package filename
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '/\\:' '---')"
          mkdir -p dist-vsix
          echo "VSIX_PATH=dist-vsix/bookmarks-ai-${package_version}-${safe_ref}-${GITHUB_RUN_NUMBER}.vsix" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out "$VSIX_PATH"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-ai-vsix
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Attach VSIX to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "VS Code extension package."
          gh release upload "${GITHUB_REF_NAME}" "$VSIX_PATH" --clobber
