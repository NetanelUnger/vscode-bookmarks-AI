name: Package VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build VS Code extension package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare package filename
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            release_ref="latest"
          else
            release_ref="${GITHUB_REF_NAME}"
          fi
          safe_ref="$(echo "${release_ref}" | tr '/\\:' '---')"
          mkdir -p dist-vsix
          echo "RELEASE_REF=${release_ref}" >> "$GITHUB_ENV"
          echo "VSIX_PATH=dist-vsix/bookmarks-ai-${package_version}-${safe_ref}-${GITHUB_RUN_NUMBER}.vsix" >> "$GITHUB_ENV"

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out "$VSIX_PATH"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-ai-vsix
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Attach VSIX to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${RELEASE_REF}" == "latest" ]]; then
            gh release view "${RELEASE_REF}" >/dev/null 2>&1 || \
              gh release create "${RELEASE_REF}" --title "Latest Build" --notes "Latest VS Code extension package from the main branch." --prerelease
          else
            gh release view "${RELEASE_REF}" >/dev/null 2>&1 || \
              gh release create "${RELEASE_REF}" --title "${RELEASE_REF}" --notes "VS Code extension package."
          fi
          gh release upload "${RELEASE_REF}" "$VSIX_PATH" --clobber
